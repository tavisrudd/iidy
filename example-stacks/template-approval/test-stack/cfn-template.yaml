Parameters:
  Name:
    Type: String
    Description: Name to display in the test resource
    Default: World

  Message:
    Type: String
    Description: Custom message to include in metadata
    Default: Hello from CloudFormation

Resources:
  # WaitConditionHandle as required by the spec
  TestWaitHandle:
    Type: AWS::CloudFormation::WaitConditionHandle
    Metadata:
      DisplayName: !Sub "Hello ${Name}"
      Message: !Ref Message
      Timestamp: !Ref AWS::StackId

  # Additional test resource to demonstrate approval workflow
  TestParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/iidy/template-approval/test/${Name}"
      Type: String
      Value: !Sub |
        {
          "stackName": "${AWS::StackName}",
          "deployedAt": "${AWS::StackId}",
          "message": "${Message}",
          "approvalWorkflow": "enabled"
        }
      Description: !Sub "Test parameter for ${Name} - deployed via template approval workflow"
      Tags:
        Stack: !Ref AWS::StackName
        Name: !Ref Name

Outputs:
  WaitHandleRef:
    Description: Reference to the WaitConditionHandle
    Value: !Ref TestWaitHandle

  ParameterName:
    Description: Name of the created SSM parameter
    Value: !Ref TestParameter

  GreetingMessage:
    Description: The complete greeting message
    Value: !Sub "Hello ${Name}! ${Message}"