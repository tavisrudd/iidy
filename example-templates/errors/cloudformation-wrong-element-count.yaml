# Error example: CloudFormation tags with wrong element counts
# Expected error: Wrong number of elements for specific tags

AWSTemplateFormatVersion: '2010-09-09'
Description: Example with wrong element counts in CloudFormation tags

Mappings:
  RegionMap:
    us-east-1:
      AMI: ami-12345

Resources:
  MyBucket:
    Type: AWS::S3::Bucket
    Properties:
      # Invalid !Join - only has one element instead of [delimiter, array]
      BucketName: !Join ["-"]
        
  MyInstance:
    Type: AWS::EC2::Instance
    Properties:
      # Invalid !Select - only has one element instead of [index, array]  
      AvailabilityZone: !Select [0]
        
  MyOtherInstance:
    Type: AWS::EC2::Instance
    Properties:
      # Invalid !FindInMap - only has two elements instead of [map, key1, key2]
      ImageId: !FindInMap [RegionMap, us-east-1]