# Test file to reproduce incorrect line number reporting
AWSTemplateFormatVersion: '2010-09-09'

$defs:
  data: 
    - key: "a"
      value: "1"
    - key: "b" 
      value: "2"

Resources:
  # First mapListToHash - should work fine
  Resource1:
    Type: AWS::SSM::Parameter
    Properties:
      Value: !$toJsonString
        - !$mapListToHash
            items: !$ data
            template: !$ item
            
  # Second mapListToHash - missing template field  
  Resource2:
    Type: AWS::SSM::Parameter
    Properties:
      Value: !$toJsonString
        - !$mapListToHash
            items: !$ data
            # template field missing here intentionally
            
  # Third mapListToHash - should work fine
  Resource3:
    Type: AWS::SSM::Parameter  
    Properties:
      Value: !$toJsonString
        - !$mapListToHash
            items: !$ data
            template: !$ item