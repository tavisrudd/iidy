# A CFN template that uses the MonitoredQueue custom resource template
# to stamp out multiple queues with monitoring.
---
Description: Event processing queues

$imports:
  MonitoredQueue: monitored-queue-template.yaml

Parameters:
  Environment:
    AllowedValues: [development, staging, production]
    Type: String
  AlertTopicArn:
    Type: String

Resources:
  # Each of these expands into a Queue + two CloudWatch Alarms.
  # Resource names are prefixed: OrderEvents -> OrderEventsQueue, OrderEventsQueueDepthAlarm, etc.
  OrderEvents:
    Type: MonitoredQueue
    Properties:
      QueueLabel: OrderEvents
      AlarmPriority: "P2"
      AlarmMaxMessageAge: 120

  PaymentEvents:
    Type: MonitoredQueue
    Properties:
      QueueLabel: PaymentEvents
      AlarmPriority: "P1"
      AlarmMaxMessageAge: 60
      AlarmMaxQueueDepth: 100

  NotificationEvents:
    Type: MonitoredQueue
    Properties:
      QueueLabel: NotificationEvents
      AlarmPriority: "P3"

  AuditLog:
    Type: MonitoredQueue
    Properties:
      QueueLabel: AuditLog
      AlarmPriority: "P4"
      AlarmMaxMessageAge: 300

  # A queue with a dead letter queue redrive policy
  RetryableEvents:
    Type: MonitoredQueue
    Properties:
      QueueLabel: RetryableEvents
      RedrivePolicy:
        deadLetterTargetArn:
          Fn::GetAtt:
            - DeadLetterQueue
            - Arn
        maxReceiveCount: 3
      AlarmPriority: "P3"
      AlarmMaxMessageAge: 180

  DeadLetter:
    Type: MonitoredQueue
    Properties:
      QueueLabel: DeadLetter

  # Regular AWS resources can be mixed in alongside custom resource types.
  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub app--${Environment}--dead-letter
      MessageRetentionPeriod: 1209600

  EventTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub app--${Environment}--events
