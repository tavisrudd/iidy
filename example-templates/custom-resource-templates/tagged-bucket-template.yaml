# A simple custom resource template for S3 buckets with standard tags.
# Demonstrates Parameters promotion via $global.
$params:
  - Name: BucketSuffix
    Type: String
  - Name: AccessControl
    Default: Private

Parameters:
  Environment:
    Type: String
    $global: true
  CostCenter:
    Type: String
    $global: true

Resources:
  Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${AWS::StackName}--{{BucketSuffix}}
      AccessControl: !$ AccessControl
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: CostCenter
          Value: !Ref CostCenter

Outputs:
  BucketArn:
    Value: !GetAtt Bucket.Arn
