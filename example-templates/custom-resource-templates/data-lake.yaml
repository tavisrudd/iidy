# A CFN template that uses the TaggedBucket custom resource template.
# Demonstrates: Parameters promoted from the template ($global) are
# stitched into the top-level Parameters section automatically.
AWSTemplateFormatVersion: 2010-09-09
Description: Data lake storage buckets

$imports:
  TaggedBucket: tagged-bucket-template.yaml

Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, staging, prod]
  CostCenter:
    Type: String
    Default: engineering

Resources:
  RawData:
    Type: TaggedBucket
    Properties:
      BucketSuffix: raw-data

  ProcessedData:
    Type: TaggedBucket
    Properties:
      BucketSuffix: processed-data

  Archives:
    Type: TaggedBucket
    Properties:
      BucketSuffix: archives
      AccessControl: LogDeliveryWrite
