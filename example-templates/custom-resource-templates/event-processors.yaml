# A CFN template that uses LambdaWorker custom resource template.
# Demonstrates: Mappings promoted from the template via $global,
# JSON Schema validation on Permissions and Tags params.
AWSTemplateFormatVersion: 2010-09-09
Description: Event processing Lambda functions

$imports:
  LambdaWorker: lambda-worker-template.yaml

Parameters:
  Environment:
    Type: String
    AllowedValues: [development, staging, production]

Resources:
  OrderProcessor:
    Type: LambdaWorker
    Properties:
      FunctionName: order-processor
      Runtime: nodejs20.x
      SourceBucket: deploy-artifacts
      SourceKey: lambdas/order-processor.zip
      Tags:
        - Key: Team
          Value: commerce
        - Key: Component
          Value: order-processing
      Permissions:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
          Resource: !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/orders

  PaymentProcessor:
    Type: LambdaWorker
    Properties:
      FunctionName: payment-processor
      Runtime: python3.12
      Handler: main.handle
      SourceBucket: deploy-artifacts
      SourceKey: lambdas/payment-processor.zip
      Tags:
        - Key: Team
          Value: payments
      Permissions:
        - Effect: Allow
          Action: sqs:SendMessage
          Resource: !Sub arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:payment-receipts
        - Effect: Allow
          Action:
            - secretsmanager:GetSecretValue
          Resource: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:payment-api-key-*
