# A custom resource template for IAM deploy roles.
# Demonstrates $params with $global flag and !Ref 'AWS::NoValue' defaults.
$params:
  - Name: RoleName
    Default: !Ref "AWS::StackName"
    $global: true
  - Name: SsmResources
    Default: !Ref "AWS::NoValue"
    $global: true
  - Name: CfnResources
    Default: !Ref "AWS::NoValue"
    $global: true

Resources:
  DeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !$ RoleName
      AssumeRolePolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${AWS::AccountId}:root
            Action: sts:AssumeRole
      Policies:
        - PolicyName: cfn-permissions
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResources
                  - cloudformation:GetStackPolicy
                Resource: !$ CfnResources
              - Effect: Allow
                Action:
                  - cloudformation:List*
                Resource: "*"
        - PolicyName: ssm-permissions
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:GetParameters
                - ssm:GetParametersByPath
              Resource: !$ SsmResources
