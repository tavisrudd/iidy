# Demonstrates the Overrides feature for customizing template internals
# that aren't exposed as $params. Use Overrides sparingly -- prefer $params
# for anything that varies regularly between instances.
AWSTemplateFormatVersion: 2010-09-09
Description: Queue with FIFO override

$imports:
  MonitoredQueue: monitored-queue-template.yaml

Parameters:
  Environment:
    Type: String
    AllowedValues: [development, staging, production]
  AlertTopicArn:
    Type: String

Resources:
  # A standard queue using only $params.
  StandardQueue:
    Type: MonitoredQueue
    Properties:
      QueueLabel: Standard

  # Overrides lets you deep-merge into the template's resolved output.
  # Use it when the template author didn't expose something as a $param
  # and you need to tweak it without forking the template.
  FifoQueue:
    Type: MonitoredQueue
    Properties:
      QueueLabel: Fifo
    Overrides:
      Resources:
        Queue:
          Properties:
            FifoQueue: true
            ContentBasedDeduplication: true
