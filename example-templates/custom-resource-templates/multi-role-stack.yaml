# A CFN template that uses DeployRole custom resource template multiple times.
# Demonstrates: name-prefixing on resources, global section promotion (Outputs
# are defined in the template and automatically stitched into the top level).
AWSTemplateFormatVersion: 2010-09-09
Description: CI/CD deploy roles

$imports:
  DeployRole: deploy-role-template.yaml

Resources:
  # Expands to: AppDeployRoleDeployRole (Type: AWS::IAM::Role)
  AppDeployRole:
    Type: DeployRole
    Properties:
      RoleName: app-deploy-role
      SsmResources:
        - arn:aws:ssm:*:*:parameter/development/app/*
        - arn:aws:ssm:*:*:parameter/production/app/*
      CfnResources:
        - arn:aws:cloudformation:*:*:stack/app-development*
        - arn:aws:cloudformation:*:*:stack/app-production*

  # Expands to: DataPipelineDeployRoleDeployRole
  DataPipelineDeployRole:
    Type: DeployRole
    Properties:
      RoleName: data-pipeline-deploy-role
      SsmResources:
        - arn:aws:ssm:*:*:parameter/*/data-pipeline/*
      CfnResources:
        - arn:aws:cloudformation:*:*:stack/data-pipeline-*

  # A regular AWS resource that references the expanded role by its prefixed name.
  AppDeployRoleS3Policy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: s3-access
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
            Resource:
              - arn:aws:s3:::deploy-artifacts/*
      Roles:
        - !Ref AppDeployRoleDeployRole
