# A custom resource template for Lambda workers with environment-aware sizing.
# Demonstrates: Mappings promotion ($global), Schema validation on $params,
# and multiple validation types (AllowedValues, AllowedPattern, Type).
$params:
  - Name: FunctionName
    Type: String
    AllowedPattern: "^[a-zA-Z][a-zA-Z0-9-]+$"
  - Name: Handler
    Type: String
    Default: index.handler
  - Name: Runtime
    Type: String
    AllowedValues: [nodejs20.x, python3.12, python3.13]
    Default: nodejs20.x
  - Name: SourceBucket
    Type: String
  - Name: SourceKey
    Type: String
  - Name: Permissions
    Schema:
      type: array
      items:
        type: object
        required: [Effect, Action, Resource]
        properties:
          Effect:
            type: string
            enum: [Allow, Deny]
          Action:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
          Resource:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
  - Name: Tags
    Default: []
    Schema:
      type: array
      items:
        type: object
        required: [Key, Value]
        properties:
          Key:
            type: string
            minLength: 1
          Value:
            type: string
        additionalProperties: false

Parameters:
  Environment:
    Type: String
    $global: true

Mappings:
  WorkerSizing:
    production:
      MemorySize: 1024
      Timeout: 300
    development:
      MemorySize: 256
      Timeout: 60
    staging:
      MemorySize: 512
      Timeout: 120
    $global: true

Resources:
  Function:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}--{{FunctionName}}
      Handler: !$ Handler
      Runtime: !$ Runtime
      MemorySize: !FindInMap [WorkerSizing, !Ref Environment, MemorySize]
      Timeout: !FindInMap [WorkerSizing, !Ref Environment, Timeout]
      Code:
        S3Bucket: !$ SourceBucket
        S3Key: !$ SourceKey
      Tags: !$ Tags
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
  ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: function-permissions
          PolicyDocument:
            Version: 2012-10-17
            Statement: !$ Permissions

Outputs:
  FunctionArn:
    Value: !GetAtt Function.Arn
