# Example demonstrating !$mapListToHash tag for converting key-value pairs to hash
# The !$mapListToHash tag converts a list of objects with key/value fields into a hash/object

AWSTemplateFormatVersion: '2010-09-09'
Description: 'Example of !$mapListToHash tag for key-value pair conversion'

$defs:
  keyValuePairs:
    - key: "NODE_ENV"
      value: "production"
    - key: "PORT"
      value: "3000"
    - key: "DEBUG"
      value: "false"
    - key: "LOG_LEVEL"
      value: "info"

  settingsData:
    - name: "max_connections"
      setting: "100"
    - name: "timeout_seconds"
      setting: "30"
    - name: "retry_attempts"
      setting: "3"

  tagList:
    - tagKey: "Environment"
      tagValue: "production"
    - tagKey: "Team"
      tagValue: "backend"
    - tagKey: "Service"
      tagValue: "api"
    - tagKey: "Version"
      tagValue: "1.2.3"

  configItems:
    - parameter: "database.host"
      content: "db.example.com"
    - parameter: "database.port"
      content: "5432"
    - parameter: "database.name"
      content: "myapp"
    - parameter: "redis.host"
      content: "redis.example.com"

Resources:
  # Example 1: Basic key-value conversion (default key/value fields)
  EnvironmentVariables:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/env-vars
      Type: String
      Value: !$toJsonString
        - !$mapListToHash
            items: !$ keyValuePairs
            template: !$ item

  # Example 2: Custom field names (name/setting)
  ApplicationSettings:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/settings
      Type: String
      Value: !$toJsonString
        - !$mapListToHash
            items: !$ settingsData
            template:
              - !$ item.name
              - !$ item.setting

  # Example 3: Custom field names (tagKey/tagValue)
  ResourceTags:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/tags
      Type: String
      Value: !$toJsonString
        - !$mapListToHash
            items: !$ tagList
            template:
              - !$ item.tagKey
              - !$ item.tagValue

  # Example 4: Configuration parameters (parameter/content)
  ConfigurationHash:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/parameters
      Type: String
      Value: !$toJsonString
        - !$mapListToHash
            items: !$ configItems
            template:
              - !$ item.parameter
              - !$ item.content

  # Example 5: Dynamic key-value pairs from mapped data
  ServiceConfigurations:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/services
      Type: String
      Value: !$toJsonString
        - !$mapListToHash
            items: !$map
              items:
                - name: "api"
                  port: 3000
                - name: "web"
                  port: 80
                - name: "worker"
                  port: 6379
              template:
                - !$ item.name
                - !$join [":", [!$ item.name, !$ item.port]]
            template: !$ item

  # Example 6: Complex transformation with nested objects
  DatabaseConnections:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/databases
      Type: String
      Value: !$toJsonString
        - !$mapListToHash
            items: !$map
              items:
                - db: "primary"
                  host: "db1.example.com"
                  port: 5432
                - db: "replica"
                  host: "db2.example.com"  
                  port: 5432
                - db: "analytics"
                  host: "analytics-db.example.com"
                  port: 5432
              template:
                - !$ item.db
                - host: !$ item.host
                  port: !$ item.port
                  url: !$join ["", ["postgresql://", !$ item.host, ":", !$ item.port, "/myapp"]]
            template: !$ item

  # Example 7: Security group mappings
  SecurityGroupMappings:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/security-groups
      Type: String
      Value: !$toJsonString
        - !$mapListToHash
            items: !$map
              items:
                - service: "web"
                  ports: [80, 443]
                - service: "api"
                  ports: [3000, 3001]
                - service: "database"
                  ports: [5432]
              template:
                - !$join ["-", [!$ item.service, "sg"]]
                - serviceName: !$ item.service
                  allowedPorts: !$ item.ports
                  description: !$join [" ", ["Security group for", !$ item.service, "service"]]
            template: !$ item

  # Example 8: Environment-specific configurations
  EnvironmentConfigs:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/environments
      Type: String
      Value: !$toJsonString
        - !$mapListToHash
            items: !$map
              items:
                - env: "dev"
                  domain: "dev.example.com"
                  ssl: false
                - env: "staging"
                  domain: "staging.example.com"
                  ssl: true
                - env: "prod"
                  domain: "example.com"
                  ssl: true
              template:
                key: !$ item.env
                value:
                  baseUrl: !$join 
                    - ""
                    - - !$if
                          test: !$ item.ssl
                          then: "https"
                          else: "http"
                      - "://"
                      - !$ item.domain
                  sslEnabled: !$ item.ssl
                  logLevel: !$if
                    test: !$eq [!$ item.env, "prod"]
                    then: "warn"
                    else: "debug"
            template: !$ item

  # Example 9: Feature flags configuration
  FeatureFlags:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/feature-flags
      Type: String
      Value: !$toJsonString
        - !$mapListToHash
            items:
              - key: "new_dashboard"
                value: true
              - key: "beta_features"
                value: false
              - key: "advanced_search"
                value: true
              - key: "experimental_ui"
                value: false
            template: !$ item

  # Example 10: Service discovery mappings
  ServiceDiscovery:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/service-discovery
      Type: String
      Value: !$toJsonString
        - !$mapListToHash
            items: !$map
              items:
                - svc: "user-service"
                  region: "us-east-1"
                  port: 8080
                - svc: "order-service"
                  region: "us-east-1"
                  port: 8081
                - svc: "payment-service"
                  region: "us-west-2"
                  port: 8082
              template:
                key: !$ item.svc
                value:
                  endpoint: !$join ["", [!$ item.svc, ".", !$ item.region, ".example.com:", !$ item.port]]
                  region: !$ item.region
                  healthCheck: !$join ["", ["http://", !$ item.svc, ".", !$ item.region, ".example.com:", !$ item.port, "/health"]]
            template: !$ item

Outputs:
  EnvironmentVariableCount:
    Description: Number of environment variables configured
    Value: !$eq [!$ keyValuePairs, !$ keyValuePairs]

  ConfigurationSummary:
    Description: Summary of configurations created
    Value: !$join
      - " | "
      - - "Environment Variables"
        - "Application Settings"
        - "Resource Tags"
        - "Database Configs"

  SampleEnvironmentVariable:
    Description: Sample environment variable from the hash
    Value: "NODE_ENV will be set to production"