Resources:
  # S3 bucket for storing approved CloudFormation templates
  ApprovalBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: iidy-template-approval-bucket
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          # Clean up old pending templates after 30 days
          - Id: DeleteOldPendingTemplates
            Status: Enabled
            ExpirationInDays: 30
            NoncurrentVersionExpirationInDays: 7
            Prefix: ""
            TagFilters:
              - Key: Status
                Value: pending
          # Keep approved templates for 90 days, then transition to Glacier
          - Id: ArchiveApprovedTemplates
            Status: Enabled
            Transitions:
              - TransitionInDays: 90
                StorageClass: GLACIER
            NoncurrentVersionTransitions:
              - TransitionInDays: 30
                StorageClass: GLACIER

  # Bucket policy to enforce secure access
  ApprovalBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ApprovalBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          # Deny non-HTTPS requests
          - Sid: DenyInsecureConnections
            Effect: Deny
            Principal: "*"
            Action: s3:*
            Resource:
              - !GetAtt ApprovalBucket.Arn
              - !Sub "${ApprovalBucket.Arn}/*"
            Condition:
              Bool:
                aws:SecureTransport: "false"
          # Allow CloudFormation service to read approved templates
          - Sid: AllowCloudFormationRead
            Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action:
              - s3:GetObject
              - s3:GetObjectVersion
            Resource: !Sub "${ApprovalBucket.Arn}/*"

Outputs:
  BucketName:
    Description: Name of the template approval bucket
    Value: !Ref ApprovalBucket
    Export:
      Name: !Sub "${AWS::StackName}-BucketName"

  BucketArn:
    Description: ARN of the template approval bucket
    Value: !GetAtt ApprovalBucket.Arn
    Export:
      Name: !Sub "${AWS::StackName}-BucketArn"

  BucketDomainName:
    Description: Domain name of the template approval bucket
    Value: !GetAtt ApprovalBucket.DomainName
    Export:
      Name: !Sub "${AWS::StackName}-BucketDomainName"

  BucketRegionalDomainName:
    Description: Regional domain name of the template approval bucket
    Value: !GetAtt ApprovalBucket.RegionalDomainName
    Export:
      Name: !Sub "${AWS::StackName}-BucketRegionalDomainName"