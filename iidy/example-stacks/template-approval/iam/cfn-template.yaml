Parameters:
  ApprovalBucketName:
    Type: String
    Description: Name of the S3 bucket for storing approved templates

Resources:
  # Role for template approval requestors
  TemplateApprovalRequestorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "iidy-tmpl-approval-requestor-${AWS::AccountId}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSCloudFormationReadOnlyAccess
      Policies:
        - PolicyName: TemplateApprovalRequestorPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # S3 permissions for template approval workflow
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:PutObjectAcl
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::${ApprovalBucketName}"
                  - !Sub "arn:aws:s3:::${ApprovalBucketName}/*"
              # CloudFormation stack operations
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:CreateChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResources
                  - cloudformation:GetTemplate
                  - cloudformation:ListStackResources
                  - cloudformation:EstimateTemplateCost
                  - cloudformation:ValidateTemplate
                Resource: "*"
              # Allow creating/managing resources that might be in approved templates
              - Effect: Allow
                Action:
                  - ssm:PutParameter
                  - ssm:DeleteParameter
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:DescribeParameters
                  - ssm:AddTagsToResource
                  - ssm:RemoveTagsFromResource
                  - ssm:ListTagsForResource
                Resource: 
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/iidy/template-approval/*"

  # Role for template approval reviewers/approvers
  TemplateApprovalApproverRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "iidy-tmpl-approval-approver-${AWS::AccountId}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSCloudFormationReadOnlyAccess
      Policies:
        - PolicyName: TemplateApprovalApproverPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Full S3 permissions for the approval bucket
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:PutObjectAcl
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:GetObjectVersion
                  - s3:ListObjectVersions
                Resource:
                  - !Sub "arn:aws:s3:::${ApprovalBucketName}"
                  - !Sub "arn:aws:s3:::${ApprovalBucketName}/*"
              # CloudFormation template validation
              - Effect: Allow
                Action:
                  - cloudformation:ValidateTemplate
                  - cloudformation:EstimateTemplateCost
                Resource: "*"

Outputs:
  RequestorRoleArn:
    Description: ARN of the template approval requestor role
    Value: !GetAtt TemplateApprovalRequestorRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-RequestorRoleArn"

  ApproverRoleArn:
    Description: ARN of the template approval approver role
    Value: !GetAtt TemplateApprovalApproverRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ApproverRoleArn"

  RequestorRoleName:
    Description: Name of the template approval requestor role
    Value: !Ref TemplateApprovalRequestorRole
    Export:
      Name: !Sub "${AWS::StackName}-RequestorRoleName"

  ApproverRoleName:
    Description: Name of the template approval approver role
    Value: !Ref TemplateApprovalApproverRole
    Export:
      Name: !Sub "${AWS::StackName}-ApproverRoleName"