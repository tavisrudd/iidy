# Error example: CloudFormation tags with empty arrays
# Expected error: Various "cannot have empty array" messages

AWSTemplateFormatVersion: '2010-09-09'
Description: Example with empty CloudFormation tag arrays

Resources:
  MyBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref []  # Invalid - empty array
      
  MyRole:
    Type: AWS::IAM::Role
    Properties:
      PolicyDocument:
        Statement:
          - Effect: Allow
            Resource: !Join []  # Invalid - empty array