# Error Example: Multiple Occurrence Error Positioning
# This example demonstrates that error reporting correctly identifies the specific
# occurrence of a tag that has an error, not just the first occurrence in the file.
#
# Expected Error: Should point to line 18 where Condition13 is missing the 'test' field,
# NOT to line 4 where the first !$if appears.

Resources:
  # First batch of conditions - all valid
  Condition01: !$if { test: true, then: "valid01", else: "fail01" }
  Condition02: !$if { test: false, then: "valid02", else: "fail02" }  
  Condition03: !$if { test: true, then: "valid03", else: "fail03" }
  Condition04: !$if { test: false, then: "valid04", else: "fail04" }
  Condition05: !$if { test: true, then: "valid05", else: "fail05" }
  
  # Second batch of conditions - all valid
  Condition06: !$if { test: false, then: "valid06", else: "fail06" }
  Condition07: !$if { test: true, then: "valid07", else: "fail07" }
  Condition08: !$if { test: false, then: "valid08", else: "fail08" }
  Condition09: !$if { test: true, then: "valid09", else: "fail09" }
  Condition10: !$if { test: false, then: "valid10", else: "fail10" }
  
  # Third batch - contains the error
  Condition11: !$if { test: true, then: "valid11", else: "fail11" }
  Condition12: !$if { test: false, then: "valid12", else: "fail12" }
  Condition13: !$if { then: "error_here", else: "missing_test_field" }  # ← ERROR: Missing 'test' field
  Condition14: !$if { test: true, then: "valid14", else: "fail14" }
  Condition15: !$if { test: false, then: "valid15", else: "fail15" }
  
  # Fourth batch - all valid  
  Condition16: !$if { test: true, then: "valid16", else: "fail16" }
  Condition17: !$if { test: false, then: "valid17", else: "fail17" }
  Condition18: !$if { test: true, then: "valid18", else: "fail18" }
  Condition19: !$if { test: false, then: "valid19", else: "fail19" }
  Condition20: !$if { test: true, then: "valid20", else: "fail20" }