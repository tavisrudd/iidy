# Example demonstrating !$groupBy tag for grouping items by key
# The !$groupBy tag groups items in an array based on a key expression, similar to lodash groupBy

AWSTemplateFormatVersion: '2010-09-09'
Description: 'Example of !$groupBy tag for grouping operations'

$defs:
  resources:
    - name: "web-server-1"
      type: "EC2"
      environment: "production"
      team: "frontend"
    - name: "web-server-2"
      type: "EC2"
      environment: "production"
      team: "frontend"
    - name: "api-server-1"
      type: "EC2"
      environment: "production"
      team: "backend"
    - name: "database-1"
      type: "RDS"
      environment: "production"
      team: "backend"
    - name: "test-server-1"
      type: "EC2"
      environment: "staging"
      team: "qa"
    - name: "test-database"
      type: "RDS"
      environment: "staging"
      team: "qa"

  users:
    - name: "alice"
      department: "engineering"
      role: "developer"
      level: "senior"
    - name: "bob"
      department: "engineering"
      role: "developer"
      level: "junior"
    - name: "carol"
      department: "engineering"
      role: "manager"
      level: "senior"
    - name: "david"
      department: "marketing"
      role: "analyst"
      level: "senior"
    - name: "eve"
      department: "marketing"
      role: "manager"
      level: "senior"
    - name: "frank"
      department: "sales"
      role: "representative"
      level: "junior"

  logEntries:
    - timestamp: "2024-01-01T10:00:00Z"
      level: "INFO"
      service: "api"
      message: "Request processed"
    - timestamp: "2024-01-01T10:01:00Z"
      level: "ERROR"
      service: "api"
      message: "Database connection failed"
    - timestamp: "2024-01-01T10:02:00Z"
      level: "INFO"
      service: "web"
      message: "Page rendered"
    - timestamp: "2024-01-01T10:03:00Z"
      level: "WARN"
      service: "api"
      message: "Slow query detected"
    - timestamp: "2024-01-01T10:04:00Z"
      level: "ERROR"
      service: "web"
      message: "Asset not found"

Resources:
  # Example 1: Group resources by environment
  ResourcesByEnvironment:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/resources-by-env
      Type: String
      Value: !$toJsonString
        - !$groupBy
            items: !$ resources
            key: !$ item.environment

  # Example 2: Group resources by type
  ResourcesByType:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/resources-by-type
      Type: String
      Value: !$toJsonString
        - !$groupBy
            items: !$ resources
            key: !$ item.type

  # Example 3: Group resources by team
  ResourcesByTeam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/resources-by-team
      Type: String
      Value: !$toJsonString
        - !$groupBy
            items: !$ resources
            key: !$ item.team

  # Example 4: Group users by department
  UsersByDepartment:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/users-by-dept
      Type: String
      Value: !$toJsonString
        - !$groupBy
            items: !$ users
            key: !$ item.department

  # Example 5: Group users by role
  UsersByRole:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/users-by-role
      Type: String
      Value: !$toJsonString
        - !$groupBy
            items: !$ users
            key: !$ item.role

  # Example 6: Group users by seniority level
  UsersByLevel:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/users-by-level
      Type: String
      Value: !$toJsonString
        - !$groupBy
            items: !$ users
            key: !$ item.level

  # Example 7: Group log entries by level
  LogsByLevel:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/logs-by-level
      Type: String
      Value: !$toJsonString
        - !$groupBy
            items: !$ logEntries
            key: !$ item.level

  # Example 8: Group log entries by service
  LogsByService:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/logs-by-service
      Type: String
      Value: !$toJsonString
        - !$groupBy
            items: !$ logEntries
            key: !$ item.service

  # Example 9: Group with complex key expression
  ResourcesByEnvironmentAndType:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/resources-by-env-type
      Type: String
      Value: !$toJsonString
        - !$groupBy
            items: !$ resources
            key: !$join ["-", [!$ item.environment, !$ item.type]]

  # Example 10: Group with conditional key
  UsersByDepartmentAndSeniority:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/users-by-dept-seniority
      Type: String
      Value: !$toJsonString
        - !$groupBy
            items: !$ users
            key: !$join ["-", [!$ item.department, !$ item.level]]

  # Example 11: Custom variable name
  ResourcesByOwnership:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/resources-by-ownership
      Type: String
      Value: !$toJsonString
        - !$groupBy
            items: !$ resources
            var: resource
            key: !$join ["-", [!$ resource.team, !$ resource.environment]]

  # Example 12: Nested grouping for complex analysis
  TeamResourceAnalysis:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/team-analysis
      Type: String
      Value: !$toJsonString
        - byTeam: !$groupBy
            items: !$ resources
            key: !$ item.team
          byEnvironment: !$groupBy
            items: !$ resources
            key: !$ item.environment
          byType: !$groupBy
            items: !$ resources
            key: !$ item.type

  # Example 13: Group and count
  ResourceCounts:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/resource-counts
      Type: String
      Value: !$toJsonString
        - environmentCounts: !$mapValues
            items: !$groupBy
              items: !$ resources
              key: !$ item.environment
            template: !$eq [!$ item.value, !$ item.value]  # Simple count representation
          typeCounts: !$mapValues
            items: !$groupBy
              items: !$ resources
              key: !$ item.type
            template: !$eq [!$ item.value, !$ item.value]

  # Example 14: Group with filtering
  ProductionResourcesByTeam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/prod-resources-by-team
      Type: String
      Value: !$toJsonString
        - !$groupBy
            items: !$map
              items: !$ resources
              filter: !$eq [!$ item.environment, "production"]
              template: !$ item
            key: !$ item.team

  # Example 15: Error analysis grouping
  ErrorAnalysis:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/error-analysis
      Type: String
      Value: !$toJsonString
        - errorsByService: !$groupBy
            items: !$map
              items: !$ logEntries
              filter: !$eq [!$ item.level, "ERROR"]
              template: !$ item
            key: !$ item.service
          warningsByService: !$groupBy
            items: !$map
              items: !$ logEntries
              filter: !$eq [!$ item.level, "WARN"]
              template: !$ item
            key: !$ item.service

Outputs:
  TotalResources:
    Description: Total number of resources
    Value: !$eq [!$ resources, !$ resources]

  TotalUsers:
    Description: Total number of users
    Value: !$eq [!$ users, !$ users]

  GroupingSummary:
    Description: Summary of grouping operations
    Value: !$join
      - " | "
      - - "Resources grouped by environment, type, and team"
        - "Users grouped by department, role, and level"
        - "Logs grouped by level and service"

  SampleGrouping:
    Description: Example of grouped data structure
    Value: "Resources will be grouped into production/staging by environment"