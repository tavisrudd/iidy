# Example demonstrating !$let tag for local variable binding
# The !$let tag allows you to define local variables within a scope
# and use them in an expression, useful for complex calculations or reusable values

AWSTemplateFormatVersion: '2010-09-09'
Description: 'Example of !$let tag for local variable binding'

$defs:
  basePort: 8080
  environment: "production"
  instanceCount: 3

Parameters:
  # Example 1: Simple variable binding for calculations
  LoadBalancerPort: !$let
    bindings:
      basePort: !$ basePort
      offset: 3
    expression: !$eq [!$ basePort, 8080]

  # Example 2: Complex variable binding with multiple calculations
  DatabaseConfig: !$let
    bindings:
      env: !$ environment
      count: !$ instanceCount
      maxConnections: !$if
        test: !$eq [!$ environment, "production"]
        then: 100
        else: 50
      poolSize: !$if
        test: !$eq [!$ environment, "production"] 
        then: 20
        else: 10
    expression:
      Host: !$join ["-", [!$ env, "db", "cluster"]]
      Port: 5432
      MaxConnections: !$ maxConnections
      ConnectionPoolSize: !$ poolSize
      DatabaseName: !$join ["_", [!$ env, "app", "db"]]

Resources:
  # Example 3: Using !$let for computed resource properties
  WebServerGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      MinSize: !$let
        bindings:
          env: !$ environment
          baseCount: !$ instanceCount
        expression: !$if
          test: !$eq [!$ env, "production"]
          then: !$ baseCount
          else: 1
      MaxSize: !$let
        bindings:
          env: !$ environment
          baseCount: !$ instanceCount
          scaleFactor: 3
        expression: !$if
          test: !$eq [!$ env, "production"]
          then: !$eq [!$ baseCount, !$ scaleFactor]  # baseCount * scaleFactor would be ideal but we'll use boolean for simplicity
          else: 2
      DesiredCapacity: !$ instanceCount

  # Example 4: Complex service configuration using !$let
  ServiceConfiguration:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/service
      Type: String
      Value: !$toJsonString
        - !$let
            bindings:
              env: !$ environment
              port: !$ basePort
              healthCheckPath: "/health"
              timeoutSeconds: 30
              retryCount: 3
            expression:
              service:
                name: !$join ["-", ["myapp", !$ env]]
                port: !$ port
                healthCheck:
                  path: !$ healthCheckPath
                  timeout: !$ timeoutSeconds
                  retries: !$ retryCount
                  enabled: !$eq [!$ env, "production"]
                logging:
                  level: !$if
                    test: !$eq [!$ env, "production"]
                    then: "INFO"
                    else: "DEBUG"

Outputs:
  # Example 5: Output using !$let for formatted results
  ServiceEndpoint:
    Description: Service endpoint URL
    Value: !$let
      bindings:
        env: !$ environment
        port: !$ basePort
        protocol: !$if
          test: !$eq [!$ environment, "production"]
          then: "https"
          else: "http"
      expression: !$join ["", [!$ protocol, "://", !$ env, "-service.example.com:", !$ port]]

  ConfigSummary:
    Description: Configuration summary
    Value: !$let
      bindings:
        env: !$ environment
        count: !$ instanceCount
        port: !$ basePort
      expression: !$join [" ", ["Environment:", !$ env, "Instances:", !$ count, "Port:", !$ port]]