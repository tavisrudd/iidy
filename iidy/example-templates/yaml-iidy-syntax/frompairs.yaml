# Example demonstrating !$fromPairs tag for converting key-value pairs to object
# The !$fromPairs tag converts an array of [key, value] pairs into an object/hash

AWSTemplateFormatVersion: '2010-09-09'
Description: 'Example of !$fromPairs tag for object creation from pairs'

$defs:
  environmentPairs:
    - ["NODE_ENV", "production"]
    - ["PORT", "3000"]
    - ["DEBUG", "false"]
    - ["LOG_LEVEL", "info"]

  configurationPairs:
    - ["database.host", "db.example.com"]
    - ["database.port", "5432"]
    - ["database.name", "myapp"]
    - ["redis.host", "redis.example.com"]
    - ["redis.port", "6379"]

  tagPairs:
    - ["Environment", "production"]
    - ["Team", "backend"]
    - ["Service", "api"]
    - ["Version", "1.2.3"]
    - ["Owner", "platform-team"]

  settingsList:
    - setting: "max_connections"
      value: "100"
    - setting: "timeout_seconds"
      value: "30"
    - setting: "retry_attempts"
      value: "3"

Resources:
  # Example 1: Basic key-value pairs to object
  EnvironmentVariables:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/env-vars
      Type: String
      Value: !$toJsonString
        - !$fromPairs
            - ["NODE_ENV", "production"]
            - ["PORT", "3000"]
            - ["DEBUG", "false"]
            - ["LOG_LEVEL", "info"]

  # Example 2: Configuration pairs to object
  ApplicationConfig:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/settings
      Type: String
      Value: !$toJsonString
        - !$fromPairs
            - ["database.host", "db.example.com"]
            - ["database.port", "5432"]
            - ["database.name", "myapp"]
            - ["redis.host", "redis.example.com"]

  # Example 3: Tag pairs to object
  ResourceTags:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/tags
      Type: String
      Value: !$toJsonString
        - !$fromPairs
            - ["Environment", "production"]
            - ["Service", "api"]
            - ["Team", "backend"]
            - ["Version", "1.2.3"]

  # Example 4: Dynamic pairs from mapped data
  ServicePorts:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/service-ports
      Type: String
      Value: !$toJsonString
        - !$fromPairs
            - !$map
                items:
                  - name: "api"
                    port: 3000
                  - name: "web"
                    port: 80
                  - name: "worker"
                    port: 6379
                  - name: "admin"
                    port: 8080
                template:
                  - !$ item.name
                  - !$ item.port

  # Example 5: Transform objects to pairs and back to object
  TransformedSettings:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/transformed-settings
      Type: String
      Value: !$toJsonString
        - !$fromPairs
            - !$map
                items: !$ settingsList
                template:
                  - !$ item.setting
                  - !$ item.value

  # Example 6: Feature flags from pairs
  FeatureFlags:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/feature-flags
      Type: String
      Value: !$toJsonString
        - !$fromPairs
            - ["new_dashboard", true]
            - ["beta_features", false]
            - ["advanced_search", true]
            - ["experimental_ui", false]
            - ["dark_mode", true]

  # Example 7: Environment-specific URLs
  EnvironmentUrls:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/environment-urls
      Type: String
      Value: !$toJsonString
        - !$fromPairs
            - !$map
                items:
                  - env: "dev"
                    domain: "dev.example.com"
                  - env: "staging"
                    domain: "staging.example.com"
                  - env: "prod"
                    domain: "example.com"
                template:
                  - !$ item.env
                  - !$join ["", ["https://", !$ item.domain]]

  # Example 8: Security group port mappings
  SecurityGroupPorts:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/sg-ports
      Type: String
      Value: !$toJsonString
        - !$fromPairs
            - !$map
                items:
                  - service: "web"
                    ports: [80, 443]
                  - service: "api"
                    ports: [3000, 3001]
                  - service: "database"
                    ports: [5432]
                template:
                  - !$ item.service
                  - !$ item.ports

  # Example 9: Database connection strings
  DatabaseConnections:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/db-connections
      Type: String
      Value: !$toJsonString
        - !$fromPairs
            - !$map
                items:
                  - name: "primary"
                    host: "db1.example.com"
                    port: 5432
                    database: "myapp"
                  - name: "replica"
                    host: "db2.example.com"
                    port: 5432
                    database: "myapp"
                  - name: "analytics"
                    host: "analytics-db.example.com"
                    port: 5432
                    database: "analytics"
                template:
                  - !$ item.name
                  - !$join ["", ["postgresql://", !$ item.host, ":", !$ item.port, "/", !$ item.database]]

  # Example 10: Service health check endpoints
  HealthCheckEndpoints:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/health-checks
      Type: String
      Value: !$toJsonString
        - !$fromPairs
            - !$map
                items:
                  - service: "api"
                    host: "api.example.com"
                    port: 3000
                  - service: "web"
                    host: "web.example.com"
                    port: 80
                  - service: "admin"
                    host: "admin.example.com"
                    port: 8080
                template:
                  - !$ item.service
                  - !$join ["", ["http://", !$ item.host, ":", !$ item.port, "/health"]]

  # Example 11: IAM role mappings
  IamRoleMappings:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/iam-roles
      Type: String
      Value: !$toJsonString
        - !$fromPairs
            - !$map
                items:
                  - service: "api"
                    permissions: ["s3:GetObject", "ssm:GetParameter"]
                  - service: "worker"
                    permissions: ["sqs:ReceiveMessage", "s3:PutObject"]
                  - service: "web"
                    permissions: ["s3:GetObject"]
                template:
                  - !$join ["-", [!$ item.service, "role"]]
                  - !$ item.permissions

  # Example 12: Complex nested object creation
  ServiceConfigurations:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/service-configurations
      Type: String
      Value: !$toJsonString
        - !$fromPairs
            - !$map
                items:
                  - name: "api"
                    replicas: 3
                    memory: "512Mi"
                    cpu: "500m"
                  - name: "web"
                    replicas: 2
                    memory: "256Mi"
                    cpu: "250m"
                  - name: "worker"
                    replicas: 1
                    memory: "1Gi"
                    cpu: "1000m"
                template:
                  - !$ item.name
                  - replicas: !$ item.replicas
                    resources:
                      memory: !$ item.memory
                      cpu: !$ item.cpu
                    healthCheck: !$join ["", ["/health/", !$ item.name]]

  # Example 13: Combining with split operations
  ParsedEnvironmentVars:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/parsed-env-vars
      Type: String
      Value: !$toJsonString
        - !$fromPairs
            - !$map
                items: !$split [",", "API_KEY=secret123,DB_HOST=localhost,DB_PORT=5432,LOG_LEVEL=debug"]
                template: !$split ["=", !$ item]

  # Example 14: Metric thresholds configuration
  MetricThresholds:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/metric-thresholds
      Type: String
      Value: !$toJsonString
        - !$fromPairs
            - - ["cpu_utilization", 80]
              - ["memory_utilization", 85]
              - ["disk_utilization", 90]
              - ["error_rate", 5]
              - ["response_time_p99", 2000]

  # Example 15: Alert configurations
  AlertConfigurations:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/alerts
      Type: String
      Value: !$toJsonString
        - !$fromPairs
            - !$map
                items:
                  - metric: "high_cpu"
                    threshold: 90
                    duration: 300
                  - metric: "high_memory"
                    threshold: 95
                    duration: 180
                  - metric: "high_error_rate"
                    threshold: 10
                    duration: 120
                template:
                  - !$ item.metric
                  - threshold: !$ item.threshold
                    evaluationPeriods: 2
                    datapointsToAlarm: 2
                    treatMissingData: "breaching"
                    alarmDuration: !$ item.duration

Outputs:
  EnvironmentVariableCount:
    Description: Number of environment variables
    Value: !$eq [!$ environmentPairs, !$ environmentPairs]

  ConfigurationSummary:
    Description: Summary of configurations created
    Value: !$join
      - " | "
      - - "Environment Variables"
        - "Service Configurations"
        - "Feature Flags"
        - "Health Check Endpoints"

  SampleConfiguration:
    Description: Example of object created from pairs
    Value: "NODE_ENV will be mapped to production"