# Example demonstrating !$split tag for string to array conversion
# The !$split tag takes a string and delimiter, returning an array of substrings

AWSTemplateFormatVersion: '2010-09-09'
Description: 'Example of !$split tag for string to array conversion'

$defs:
  csvData: "apple,banana,cherry,date"
  pathString: "/var/log/app/service.log"
  taggedString: "env:production,team:backend,service:api"
  emailList: "user1@example.com;user2@example.com;admin@example.com"
  versionString: "1.2.3-rc.1"

Parameters:
  # Example 1: Simple comma-separated values
  FruitList:
    Type: CommaDelimitedList
    Default: !$split [",", "apple,banana,cherry,date"]

  # Example 2: Split file path into components
  PathComponents:
    Type: CommaDelimitedList
    Default: !$split ["/", "/usr/local/bin"]

Resources:
  # Example 3: Processing tag string into individual tags
  ResourceTags:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/tags
      Type: String
      Value: !$toJsonString
        - !$map
            items: !$split [",", "Name:MyResource,Environment:Production,Version:1.2.3"]
            template: !$split [":", !$ item]

  # Example 4: Email list processing
  NotificationConfig:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/notifications
      Type: String
      Value: !$toJsonString
        - emails: !$split [";", "admin@example.com;user@example.com;support@example.com"]
          count: 3

  # Example 5: Version string parsing
  VersionInfo:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/version
      Type: String
      Value: !$toJsonString
        - !$let
            versionParts: !$split [".", "1.2.3"]
            majorMinorPatch: !$split ["-", "1.2.3"]
            in:
              version: "1.2.3"
              parts: ["1", "2", "3"]
              release: ["1", "2", "3"]

  # Example 6: Creating security group rules from port ranges
  SecurityGroupRules:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/security-rules
      Type: String
      Value: !$toJsonString
        - !$map
            items: !$split [",", "80,443,8080,8443"]
            template:
              IpProtocol: tcp
              FromPort: !$ item
              ToPort: !$ item
              CidrIp: "0.0.0.0/0"

  # Example 7: Processing environment variables from string
  EnvironmentConfig:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/environment
      Type: String
      Value: !$toJsonString
        - !$mapListToHash
            items: !$split [",", "NODE_ENV=production,PORT=3000,DEBUG=false"]
            template: !$split ["=", !$ item]

  # Example 8: Domain and subdomain extraction
  DomainConfig:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/config/domains
      Type: String
      Value: !$toJsonString
        - !$map
            items: !$split [",", "api.prod.example.com,web.prod.example.com,admin.prod.example.com"]
            template:
              full: !$ item
              subdomain: !$split [".", !$ item]

Outputs:
  # Example 9: Split and join operations
  ProcessedFruits:
    Description: Processed fruit list
    Value: !$join
      - " | "
      - !$split [",", "apple,banana,cherry,date"]

  # Example 10: Count items after splitting
  EmailCount:
    Description: Number of email addresses
    Value: 3  # Length of the split email list

  PathDepth:
    Description: Path depth (number of components)
    Value: !$join
      - " -> "
      - !$split ["/", "/usr/local/bin"]