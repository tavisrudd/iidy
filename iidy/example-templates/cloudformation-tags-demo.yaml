$defs:
  app_name: "tag-demo-app"
  environment: "production"
  region: "us-west-2"
  vpc_cidr: "10.0.0.0/16"
  
  # Database configuration
  db_config:
    engine: "postgres"
    version: "13.7"
    username: "appuser"
    backup_retention: 7

AWSTemplateFormatVersion: "2010-09-09"
Description: "Demonstration of CloudFormation tags with iidy preprocessing"

Parameters:
  Environment:
    Type: String
    Default: "{{environment}}"
    Description: "Target environment"
  
  DatabasePassword:
    Type: String
    NoEcho: true
    MinLength: 8
    Description: "Database password"

Resources:
  # S3 Bucket with various CloudFormation tags
  ApplicationBucket:
    Type: "AWS::S3::Bucket"
    Properties:
      # !Sub tag with preprocessing inside
      BucketName: !Sub "{{app_name}}-${AWS::Region}-${AWS::AccountId}-bucket"
      
      # Bucket configuration with !Ref
      VersioningConfiguration:
        Status: "Enabled"
      
      # Tags with mixed CloudFormation intrinsics and preprocessing
      Tags:
        - Key: "Name"
          Value: !Sub "{{app_name}} Application Bucket"
        - Key: "Environment"
          Value: !Ref Environment
        - Key: "Region" 
          Value: "{{region}}"
        - Key: "ManagedBy"
          Value: "iidy"

  # RDS Database with complex tag combinations
  Database:
    Type: "AWS::RDS::DBInstance"
    Properties:
      # !Sub with mixed CloudFormation variables and preprocessing
      DBInstanceIdentifier: !Sub "{{app_name}}-${AWS::Region}-db"
      
      # Use preprocessing for configuration values
      Engine: "{{db_config.engine}}"
      EngineVersion: "{{db_config.version}}"
      DBInstanceClass: "db.t3.micro"
      MasterUsername: "{{db_config.username}}"
      MasterUserPassword: !Ref DatabasePassword
      AllocatedStorage: 20
      
      # Backup configuration with CloudFormation conditions
      BackupRetentionPeriod: "{{db_config.backup_retention}}"
      DeleteAutomatedBackups: !$if
        condition: !$eq ["{{environment}}", "production"]
        then: false
        else: true
      
      # Complex tags showing all intrinsic function types
      Tags:
        - Key: "Name"
          Value: !Sub "{{app_name}} ${Environment} Database"
        - Key: "Environment"
          Value: !Ref Environment
        - Key: "Engine"
          Value: "{{db_config.engine}} {{db_config.version}}"
        - Key: "BackupPolicy"
          Value: !Sub "Retain-{{db_config.backup_retention}}-days"
        - Key: "DatabaseId"
          Value: !Sub "${AWS::StackName}-primary-db"

  # Lambda function showing UserData-style content with tags
  ProcessingFunction:
    Type: "AWS::Lambda::Function"
    Properties:
      FunctionName: !Sub "{{app_name}}-${Environment}-processor"
      Runtime: "python3.9"
      Handler: "index.handler"
      Role: !GetAtt LambdaExecutionRole.Arn
      
      # Inline code with preprocessing variables
      Code:
        ZipFile: !Sub |
          import json
          import boto3
          
          def handler(event, context):
              """
              {{app_name}} processing function for {{environment}} environment
              """
              print(f"Processing in region: {{region}}")
              print(f"Environment: {{environment}}")
              print(f"Database engine: {{db_config.engine}}")
              
              # Application logic here
              return {
                  'statusCode': 200,
                  'body': json.dumps({
                      'message': 'Hello from {{app_name}}',
                      'environment': '{{environment}}',
                      'region': '{{region}}'
                  })
              }
      
      # Environment variables using different tag types
      Environment:
        Variables:
          APP_NAME: "{{app_name}}"
          ENVIRONMENT: !Ref Environment
          DATABASE_HOST: !GetAtt Database.Endpoint.Address
          BUCKET_NAME: !Ref ApplicationBucket
          STACK_NAME: !Ref "AWS::StackName"
          REGION: !Ref "AWS::Region"
      
      Tags:
        - Key: "Name"
          Value: !Sub "{{app_name}} Processing Function"
        - Key: "Environment"
          Value: !Ref Environment
        - Key: "Component"
          Value: "backend"

  # IAM Role with policy documents using tags
  LambdaExecutionRole:
    Type: "AWS::IAM::Role"
    Properties:
      RoleName: !Sub "{{app_name}}-${Environment}-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              Service: "lambda.amazonaws.com"
            Action: "sts:AssumeRole"
      
      # Inline policy with !Sub in JSON
      Policies:
        - PolicyName: "DatabaseAndS3Access"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: "Allow"
                Action:
                  - "rds:DescribeDBInstances"
                  - "rds:Connect"
                Resource: !Sub "arn:aws:rds:${AWS::Region}:${AWS::AccountId}:db:{{app_name}}-${AWS::Region}-db"
              - Effect: "Allow"
                Action:
                  - "s3:GetObject"
                  - "s3:PutObject"
                  - "s3:DeleteObject"
                Resource: !Sub "${ApplicationBucket}/*"
              - Effect: "Allow"
                Action:
                  - "logs:CreateLogGroup"
                  - "logs:CreateLogStream"
                  - "logs:PutLogEvents"
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*"
      
      Tags:
        - Key: "Name"
          Value: !Sub "{{app_name}} Lambda Execution Role"
        - Key: "Environment"
          Value: !Ref Environment

  # CloudWatch Log Group with retention
  ProcessingFunctionLogGroup:
    Type: "AWS::Logs::LogGroup"
    Properties:
      LogGroupName: !Sub "/aws/lambda/{{app_name}}-${Environment}-processor"
      RetentionInDays: !$if
        condition: !$eq ["{{environment}}", "production"]
        then: 30
        else: 7
      Tags:
        - Key: "Name"
          Value: !Sub "{{app_name}} Processing Logs"
        - Key: "Environment"
          Value: !Ref Environment
        - Key: "RetentionPolicy"
          Value: !$if
            condition: !$eq ["{{environment}}", "production"]
            then: "30-days"
            else: "7-days"

  # SNS Topic with complex subscription setup
  NotificationTopic:
    Type: "AWS::SNS::Topic"
    Properties:
      TopicName: !Sub "{{app_name}}-${Environment}-notifications"
      DisplayName: !Sub "{{app_name}} {{environment}} Notifications"
      Tags:
        - Key: "Name"
          Value: !Sub "{{app_name}} Notification Topic"
        - Key: "Environment"
          Value: !Ref Environment

Outputs:
  # Outputs demonstrating various tag combinations
  ApplicationBucketName:
    Description: "S3 Bucket Name"
    Value: !Ref ApplicationBucket
    Export:
      Name: !Sub "{{app_name}}-${Environment}-bucket-name"

  DatabaseEndpoint:
    Description: "RDS Database Endpoint"
    Value: !GetAtt Database.Endpoint.Address
    Export:
      Name: !Sub "{{app_name}}-${Environment}-db-endpoint"

  LambdaFunctionArn:
    Description: "Lambda Function ARN"
    Value: !GetAtt ProcessingFunction.Arn
    Export:
      Name: !Sub "{{app_name}}-${Environment}-lambda-arn"

  NotificationTopicArn:
    Description: "SNS Topic ARN"
    Value: !Ref NotificationTopic
    Export:
      Name: !Sub "{{app_name}}-${Environment}-topic-arn"

  # Computed outputs using preprocessing
  StackConfiguration:
    Description: "Stack configuration summary"
    Value: !Sub |
      Application: {{app_name}}
      Environment: {{environment}}
      Region: {{region}}
      Database: {{db_config.engine}} {{db_config.version}}
      Backup Retention: {{db_config.backup_retention}} days

  StackUrls:
    Description: "Useful stack URLs"
    Value: !Sub |
      {
        "s3_console": "https://s3.console.aws.amazon.com/s3/buckets/${ApplicationBucket}",
        "rds_console": "https://console.aws.amazon.com/rds/home?region=${AWS::Region}#database:id={{app_name}}-${AWS::Region}-db",
        "lambda_console": "https://console.aws.amazon.com/lambda/home?region=${AWS::Region}#/functions/{{app_name}}-${Environment}-processor",
        "cloudformation_console": "https://console.aws.amazon.com/cloudformation/home?region=${AWS::Region}#/stacks/stackinfo?stackId=${AWS::StackId}"
      }