$defs:
  app_name: "advanced-app"
  environment: "production"
  region: "us-west-2"
  
  # Environment-specific configuration
  env_config:
    instance_type: "t3.medium"
    min_capacity: 2
    max_capacity: 6
    db_instance_class: "db.r5.large"
  
  # Network configuration
  vpc_cidr: "10.0.0.0/16"
  public_subnet_cidr: "10.0.1.0/24"
  private_subnet_cidr: "10.0.2.0/24"

AWSTemplateFormatVersion: "2010-09-09"
Description: !Sub "{{app_name}} - Advanced multi-tier application infrastructure for {{environment}} environment"

Parameters:
  Environment:
    Type: String
    Default: "{{environment}}"
    AllowedValues: ["development", "staging", "production"]
    Description: "Target deployment environment"
  
  VpcCidr:
    Type: String
    Default: "{{vpc_cidr}}"
    Description: "CIDR block for the VPC"

Resources:
  # VPC Configuration
  VPC:
    Type: "AWS::EC2::VPC"
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: "Name"
          Value: !Sub "{{app_name}}-{{environment}}-vpc"
        - Key: "Environment"
          Value: "{{environment}}"

  # Internet Gateway
  InternetGateway:
    Type: "AWS::EC2::InternetGateway"
    Properties:
      Tags:
        - Key: "Name"
          Value: !Sub "{{app_name}}-{{environment}}-igw"

  VPCGatewayAttachment:
    Type: "AWS::EC2::VPCGatewayAttachment"
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # Public Subnet
  PublicSubnet:
    Type: "AWS::EC2::Subnet"
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "{{public_subnet_cidr}}"
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: "Name"
          Value: !Sub "{{app_name}}-{{environment}}-public-subnet"
        - Key: "Type"
          Value: "Public"

  # Private Subnet
  PrivateSubnet:
    Type: "AWS::EC2::Subnet"
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "{{private_subnet_cidr}}"
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: "Name"
          Value: !Sub "{{app_name}}-{{environment}}-private-subnet"
        - Key: "Type"
          Value: "Private"

  # Route Tables
  PublicRouteTable:
    Type: "AWS::EC2::RouteTable"
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: "Name"
          Value: !Sub "{{app_name}}-{{environment}}-public-rt"

  PublicRoute:
    Type: "AWS::EC2::Route"
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: "AWS::EC2::SubnetRouteTableAssociation"
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # Security Groups
  WebSecurityGroup:
    Type: "AWS::EC2::SecurityGroup"
    Properties:
      GroupDescription: !Sub "{{app_name}} web tier security group"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: "tcp"
          FromPort: 80
          ToPort: 80
          CidrIp: "0.0.0.0/0"
        - IpProtocol: "tcp"
          FromPort: 443
          ToPort: 443
          CidrIp: "0.0.0.0/0"
        - IpProtocol: "tcp"
          FromPort: 22
          ToPort: 22
          CidrIp: "{{vpc_cidr}}"
      Tags:
        - Key: "Name"
          Value: !Sub "{{app_name}}-{{environment}}-web-sg"

  AppSecurityGroup:
    Type: "AWS::EC2::SecurityGroup"
    Properties:
      GroupDescription: !Sub "{{app_name}} application tier security group"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: "tcp"
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref WebSecurityGroup
        - IpProtocol: "tcp"
          FromPort: 22
          ToPort: 22
          CidrIp: "{{vpc_cidr}}"
      Tags:
        - Key: "Name"
          Value: !Sub "{{app_name}}-{{environment}}-app-sg"

  DatabaseSecurityGroup:
    Type: "AWS::EC2::SecurityGroup"
    Properties:
      GroupDescription: !Sub "{{app_name}} database tier security group"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: "tcp"
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref AppSecurityGroup
      Tags:
        - Key: "Name"
          Value: !Sub "{{app_name}}-{{environment}}-db-sg"

  # Application Load Balancer
  ApplicationLoadBalancer:
    Type: "AWS::ElasticLoadBalancingV2::LoadBalancer"
    Properties:
      Name: !Sub "{{app_name}}-{{environment}}-alb"
      Scheme: "internet-facing"
      Type: "application"
      Subnets:
        - !Ref PublicSubnet
      SecurityGroups:
        - !Ref WebSecurityGroup
      Tags:
        - Key: "Name"
          Value: !Sub "{{app_name}}-{{environment}}-alb"
        - Key: "Environment"
          Value: "{{environment}}"

  # Target Group
  TargetGroup:
    Type: "AWS::ElasticLoadBalancingV2::TargetGroup"
    Properties:
      Name: !Sub "{{app_name}}-{{environment}}-tg"
      Port: 8080
      Protocol: "HTTP"
      VpcId: !Ref VPC
      HealthCheckPath: "/health"
      HealthCheckProtocol: "HTTP"
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Tags:
        - Key: "Name"
          Value: !Sub "{{app_name}}-{{environment}}-tg"

  # Listener
  LoadBalancerListener:
    Type: "AWS::ElasticLoadBalancingV2::Listener"
    Properties:
      DefaultActions:
        - Type: "forward"
          TargetGroupArn: !Ref TargetGroup
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: "HTTP"

  # Launch Template
  LaunchTemplate:
    Type: "AWS::EC2::LaunchTemplate"
    Properties:
      LaunchTemplateName: !Sub "{{app_name}}-{{environment}}-lt"
      LaunchTemplateData:
        ImageId: "ami-0c02fb55956c7d316"  # Amazon Linux 2
        InstanceType: "{{env_config.instance_type}}"
        SecurityGroupIds:
          - !Ref AppSecurityGroup
        UserData: !Base64
          - !Sub |
              #!/bin/bash
              yum update -y
              echo "APP_NAME={{app_name}}" >> /etc/environment
              echo "ENVIRONMENT={{environment}}" >> /etc/environment
        TagSpecifications:
          - ResourceType: "instance"
            Tags:
              - Key: "Name"
                Value: !Sub "{{app_name}}-{{environment}}-instance"
              - Key: "Environment"
                Value: "{{environment}}"

  # Auto Scaling Group
  AutoScalingGroup:
    Type: "AWS::AutoScaling::AutoScalingGroup"
    Properties:
      AutoScalingGroupName: !Sub "{{app_name}}-{{environment}}-asg"
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      MinSize: "{{env_config.min_capacity}}"
      MaxSize: "{{env_config.max_capacity}}"
      DesiredCapacity: "{{env_config.min_capacity}}"
      VPCZoneIdentifier:
        - !Ref PrivateSubnet
      TargetGroupARNs:
        - !Ref TargetGroup
      HealthCheckType: "ELB"
      HealthCheckGracePeriod: 300
      Tags:
        - Key: "Name"
          Value: !Sub "{{app_name}}-{{environment}}-asg"
          PropagateAtLaunch: false
        - Key: "Environment"
          Value: "{{environment}}"
          PropagateAtLaunch: true

  # RDS Subnet Group
  DatabaseSubnetGroup:
    Type: "AWS::RDS::DBSubnetGroup"
    Properties:
      DBSubnetGroupDescription: !Sub "{{app_name}} database subnet group"
      SubnetIds:
        - !Ref PrivateSubnet
        - !Ref PublicSubnet  # For demo purposes, normally you'd have multiple private subnets
      Tags:
        - Key: "Name"
          Value: !Sub "{{app_name}}-{{environment}}-db-subnet-group"

  # RDS Database
  Database:
    Type: "AWS::RDS::DBInstance"
    Properties:
      DBInstanceIdentifier: !Sub "{{app_name}}-{{environment}}-db"
      Engine: "postgres"
      EngineVersion: "13.7"
      DBInstanceClass: "{{env_config.db_instance_class}}"
      MasterUsername: "dbadmin"
      MasterUserPassword: !Sub "{{app_name}}-secure-password-123"
      AllocatedStorage: 100
      StorageType: "gp2"
      VPCSecurityGroups:
        - !Ref DatabaseSecurityGroup
      DBSubnetGroupName: !Ref DatabaseSubnetGroup
      BackupRetentionPeriod: !$if
        test: !$eq ["{{environment}}", "production"]
        then: 30
        else: 7
      DeleteAutomatedBackups: !$if
        test: !$eq ["{{environment}}", "production"]
        then: false
        else: true
      DeletionProtection: !$if
        test: !$eq ["{{environment}}", "production"]
        then: true
        else: false
      Tags:
        - Key: "Name"
          Value: !Sub "{{app_name}}-{{environment}}-database"
        - Key: "Environment"
          Value: "{{environment}}"

Outputs:
  VPCId:
    Description: "VPC ID"
    Value: !Ref VPC
    Export:
      Name: !Sub "{{app_name}}-{{environment}}-vpc-id"

  PublicSubnetId:
    Description: "Public Subnet ID"
    Value: !Ref PublicSubnet
    Export:
      Name: !Sub "{{app_name}}-{{environment}}-public-subnet-id"

  PrivateSubnetId:
    Description: "Private Subnet ID"
    Value: !Ref PrivateSubnet
    Export:
      Name: !Sub "{{app_name}}-{{environment}}-private-subnet-id"

  LoadBalancerDNS:
    Description: "Application Load Balancer DNS Name"
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: !Sub "{{app_name}}-{{environment}}-alb-dns"

  DatabaseEndpoint:
    Description: "RDS Database Endpoint"
    Value: !GetAtt Database.Endpoint.Address
    Export:
      Name: !Sub "{{app_name}}-{{environment}}-db-endpoint"

  ApplicationURL:
    Description: "Application URL"
    Value: !Sub "http://${ApplicationLoadBalancer.DNSName}"