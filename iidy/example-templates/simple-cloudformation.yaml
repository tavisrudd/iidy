$defs:
  app_name: "my-demo-app"
  environment: "dev" 
  region: "us-west-2"

AWSTemplateFormatVersion: "2010-09-09"
Description: "{{app_name}} infrastructure for {{environment}}"

Parameters:
  Environment:
    Type: String
    Default: "{{environment}}"
    Description: "Deployment environment"

Resources:
  S3Bucket:
    Type: "AWS::S3::Bucket"
    Properties:
      BucketName: !Sub "{{toLowerCase app_name}}-{{environment}}-${AWS::Region}-bucket"
      Tags:
        - Key: "Name"
          Value: "{{app_name}} Storage"
        - Key: "Environment"
          Value: !Ref Environment
        - Key: "Region"
          Value: "{{region}}"

  # Conditional database resource based on environment
  DatabaseInstance: !$if
    condition: !$eq ["{{environment}}", "prod"]
    then:
      Type: "AWS::RDS::DBInstance"
      Properties:
        DBInstanceIdentifier: !Sub "{{app_name}}-{{environment}}-db"
        DBInstanceClass: "db.t3.medium"
        Engine: "postgres"
        MasterUsername: "admin"
        AllocatedStorage: 100
        Tags:
          - Key: "Name"
            Value: "{{app_name}} Production Database"
          - Key: "Environment"
            Value: "{{environment}}"
    else:
      Type: "AWS::RDS::DBInstance"
      Properties:
        DBInstanceIdentifier: !Sub "{{app_name}}-{{environment}}-db"
        DBInstanceClass: "db.t3.micro"
        Engine: "postgres"
        MasterUsername: "admin"
        AllocatedStorage: 20
        Tags:
          - Key: "Name"
            Value: "{{app_name}} Development Database"
          - Key: "Environment"
            Value: "{{environment}}"

  # Security Group for web tier
  WebSecurityGroup:
    Type: "AWS::EC2::SecurityGroup"
    Properties:
      GroupDescription: "Security group for web tier"
      GroupName: !Sub "{{app_name}}-web-{{environment}}-sg"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: "0.0.0.0/0"
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: "Name"
          Value: "{{app_name}} Web Security Group"
        - Key: "Environment"
          Value: "{{environment}}"

Outputs:
  BucketName:
    Description: "S3 Bucket Name"
    Value: !Ref S3Bucket
    Export:
      Name: !Sub "{{app_name}}-{{environment}}-bucket-name"
  
  DatabaseEndpoint: !$if
    condition: !$eq ["{{environment}}", "prod"]
    then:
      Description: "Database endpoint URL"
      Value: !GetAtt DatabaseInstance.Endpoint.Address
      Export:
        Name: !Sub "{{app_name}}-{{environment}}-db-endpoint"
    else:
      Description: "Database endpoint URL"
      Value: !GetAtt DatabaseInstance.Endpoint.Address
      Export:
        Name: !Sub "{{app_name}}-{{environment}}-db-endpoint"

  SecurityGroupId:
    Description: "Web Security Group ID"
    Value: !Ref WebSecurityGroup
    Export:
      Name: !Sub "{{app_name}}-{{environment}}-web-sg-id"