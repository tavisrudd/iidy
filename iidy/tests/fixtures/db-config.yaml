# Database configuration example
host: !$if
  condition: !$eq [!$ environment, "production"]
  then: "prod-db.example.com"
  else: "dev-db.example.com"

port: 5432

database: !$join ["_", ["myapp", !$ environment]]

credentials:
  username: !$join ["/", ["/myapp", !$ environment, "db-username"]]
  password: !$join ["/", ["/myapp", !$ environment, "db-password"]]

connection_pool:
  min_size: !$if
    condition: !$eq [!$ environment, "production"]
    then: 5
    else: 1
  max_size: !$if
    condition: !$eq [!$ environment, "production"]
    then: 20
    else: 5

ssl_mode: !$if
  condition: !$eq [!$ environment, "production"]
  then: "require"
  else: "disable"